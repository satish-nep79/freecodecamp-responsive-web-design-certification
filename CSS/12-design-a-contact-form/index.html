<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="semi-circle semi-circle--top-left"></div>
    <div class="semi-circle semi-circle--bottom-right"></div>
    <div class="semi-circle semi-circle--top-right"></div>
    <div class="semi-circle semi-circle--bottom-left"></div>
    <div class="semi-circle semi-circle--ring"></div>
    <div class="form-container">
        <form>
            <h2>Contact Us</h2>
            <label for="name">
                <span>Name:</span>
                <input type="text" id="name" name="name" placeholder="Eg: John Doe" required />
            </label>
            <label for="email">
                <span>Email:</span>
                <input type="email" id="email" name="email" placeholder="Eg: doe.john@email.com" required />
            </label>
            <label for="message">
                <span>Message:</span>
                <textarea type="text" id="message" name="message" placeholder="Type you message here"
                    required></textarea>
            </label>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
