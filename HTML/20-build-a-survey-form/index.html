<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div>
        <h1 id="title">freeCodeCamp Survey Form</h1>
        <p id="description">Thank you for taking the time to help us improve the platform</p>

        <div class="container">
            <form id="survey-form">
                <fieldset id="general-details">
                    <label id="name-label">Name<input type="text" id="name" required
                            placeholder="Enter your name" /></label>
                    <label id="email-label">Email<input type="email" id="email" required
                            placeholder="Enter your Email" /></label>
                    <label id="number-label">Age (optional)<input type="number" required min="13" max="120"
                            placeholder="Age" id="number" /></label>
                </fieldset>
                <fieldset>
                    <label>What is your favorite feature of freeCodeCamp?
                        <select id="dropdown">
                            <option value="">Select an option</option>
                            <option value="challenges">Challenges</option>
                            <option value="projects">Projects</option>
                            <option value="community">Community</option>
                            <option value="open_source">Open Source</option>
                        </select>

                    </label>
                </fieldset>
                <fieldset id="referal">
                    <p>Would you recommend freeCodeCamp to a friend?</p>
                    <label class="radio-label"><input type="radio" name="referal-radio" checked value="definetely" />
                        Definetely</label>
                    <label class="radio-label"><input type="radio" name="referal-radio" value="maybe" /> Maybe</label>
                    <label class="radio-label"><input type="radio" name="referal-radio" value="not_sure" /> Not
                        Sure</label>
                    </label>
                </fieldset>

                <fieldset>
                    <p>What would you like to see improved? (Check all that apply)</p>
                    <label class="radio-label"><input type="checkbox" value="1"> Front-end Projects</label>
                    <label class="radio-label"><input type="checkbox" value="2"> Back-end Projects</label>
                    <label class="radio-label"><input type="checkbox" value="3"> Data Visualization</label>
                    <label class="radio-label"><input type="checkbox" value="4"> Challenges</label>
                    <label class="radio-label"><input type="checkbox" value="5"> Open Source Community</label>
                    <label class="radio-label"><input type="checkbox" value="6"> Gitter help rooms</label>
                    <label class="radio-label"><input type="checkbox" value="7"> Videos</label>
                    <label class="radio-label"><input type="checkbox" value="8"> City Meetups</label>
                    <label class="radio-label"><input type="checkbox" value="9"> Wiki</label>
                    <label class="radio-label"><input type="checkbox" value="10"> Forum</label>
                </fieldset>
                <fieldset>
                    <label>Any comments or suggestions?
                        <textarea rows="8" placeholder="Enter your comment here..."></textarea>
                    </label>
                </fieldset>
                <input type="submit" value="Submit" id="submit" />
            </form>
        </div>

    </div>

</body>

</html>
