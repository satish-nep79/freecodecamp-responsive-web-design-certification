<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colored Boxes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Colored Boxes</h1>
    <div class="color-grid">
        <div class="color-box color1">
            <div class="content">
                <h3>HEX:</h3>
                <p>#FF6B6B</p>
            </div>
        </div>
        <div class="color-box color2">
            <div class="content">
                <h3>RGB:</h3>
                <p>rgb(78, 205, 196)</p>
            </div>
        </div>
        <div class="color-box color3">
            <div class="content">
                <h3>Named Color</h3>
                <p>deepskyblue</p>
            </div>
        </div>
        <div class="color-box color4">
            <div class="content">
                <h3>HSL:</h3>
                <p>hsl(280, 65%, 60%)</p>
            </div>
        </div>
        <div class="color-box color5">
            <div class="content">
                <h3>Custom:</h3>
                <p>hsl(300, 100%, 50%)</p>
                <p>rgb(255, 0, 255)</p>
                <p>#FF00FF</p>
            </div>
        </div>
    </div>
</body>

</html>
